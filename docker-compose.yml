services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DB_PATH: /app/data/signalai.db
      PORT: "3001"
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SKIP_TELEGRAM_AUTH: ${SKIP_TELEGRAM_AUTH:-false}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
    volumes:
      - dbdata:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}

  bot:
    build: ./bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
      DB_PATH: /app/data/signalai.db
    volumes:
      - dbdata:/app/data

volumes:
  dbdata:
