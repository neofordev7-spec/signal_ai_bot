services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eldorbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/eldorbot
      PORT: "3001"
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SKIP_TELEGRAM_AUTH: ${SKIP_TELEGRAM_AUTH:-false}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}

  bot:
    build: ./bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/eldorbot
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
